<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>赛博副屏 Dashboard</title>
</head>
<body>
    <h1>💻 赛博副屏探针测试</h1>
    <div id="data-box" style="font-family: monospace; background: #000; color: #0f0; padding: 20px;">
        等待数据接入...
    </div>

    <script>
        // 获取页面上的 div 元素
        const dataBox = document.getElementById('data-box');
        
        // 建立 WebSocket 连接
        let ws = new WebSocket("ws://localhost:8765");

        ws.onopen = function() {
            dataBox.innerHTML = "✅ 成功连接到 Python 后端！<br><br>";
        };

        ws.onmessage = function(event) {
            // 解析 JSON 数据
            let data = JSON.parse(event.data);
            
            let mem_used = data.memory_used.toFixed(1); // 保留一位小数
            let mem_total = data.memory_total.toFixed(1); // 保留一位小数
            
            // 拼装要在网页上显示的文本
            let displayText = `
                ⏱️ 系统已运行: ${data.boot_time} <br>
                💻 CPU 使用率: ${data.cpu_usage}% <br>
                🧠 内存使用率: ${mem_used}/${mem_total} GB (${data.memory_percent}%)
            `;
            
            // 刷新到网页上
            dataBox.innerHTML = "✅ 成功连接到 Python 后端！<br><br>" + displayText;
        };

        ws.onclose = function() {
            dataBox.innerHTML = "❌ 与服务器的连接已断开。";
        };
    </script>
</body>
</html>
